version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_data:/app/chroma_data
      - ./config:/app/../config

  agent:
    build: ./backend
    command: python agent/voice_agent.py dev
    env_file:
      - .env
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./config:/app/../config
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
